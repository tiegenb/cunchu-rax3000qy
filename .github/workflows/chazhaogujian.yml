name: 查找固件

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/everything411/qsdk
  REPO_BRANCH: 12.5.2783.2994
  CONFIG_FILE: cmcc_rax3000qy.config

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_URL }}
          ref: ${{ env.REPO_BRANCH }}
          path: openwrt

      - name: 清理kernel-headers
        working-directory: openwrt
        run: |
          rm -rf build_dir/target-*/linux-*/linux-* 2>/dev/null || true
          rm -rf dl/linux-* 2>/dev/null || true
          echo "✅ 清理完成"

      - name: 下载kernel-headers
        working-directory: openwrt
        run: |
          make toolchain/kernel-headers/download -j1 V=s

      - name: 列出dl目录
        working-directory: openwrt
        run: |
          echo "=== dl/ 目录内容 ==="
          ls -la dl/ | grep -E "linux|kernel" || echo "未找到内核相关文件"

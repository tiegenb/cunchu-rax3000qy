name: 构建RAX3000QY QSDK12.5

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH连接调试'
        required: false
        default: 'false'

env:
  REPO_OWNER: everything411
  REPO_NAME: qsdk
  REPO_BRANCH: 12.5.2783.2994
  CONFIG_FILE: cmcc_rax3000qy.config

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout QSDK
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}
          ref: ${{ env.REPO_BRANCH }}
          path: openwrt

      - name: 显示仓库信息
        run: |
          cd openwrt
          echo "✅ 已克隆仓库: ${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}"
          echo "📌 当前分支: $(git branch --show-current)"
          echo "📝 最新提交: $(git log -1 --format='%h %s')"

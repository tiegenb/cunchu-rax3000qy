name: 构建 OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH 连接至 Actions'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: 0 8 * * 2

env:
  REPO_URL: https://github.com/kkstone/immortalwrt-ipq50xx
  REPO_BRANCH: openwrt-21.02
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: 精简版.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出代码
      uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        dpkg-query -Wf '${Installed-Size}\t${Package}\n' | sort -n | tail -n 100
        df -h
        echo "正在移除大体积软件包"
        sudo apt-get remove -y '^dotnet-.*'
        sudo apt-get remove -y '^llvm-.*'
        sudo apt-get remove -y 'php.*'
        sudo apt-get remove -y '^mongodb-.*'
        sudo apt-get remove -y '^mysql-.*'
        sudo apt-get remove -y azure-cli google-cloud-sdk google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri
        sudo apt-get autoremove -y
        sudo apt-get clean
        df -h
        echo "正在移除大体积目录"
        sudo rm -rf /usr/share/dotnet/
        sudo rm -rf /usr/local/graalvm/
        sudo rm -rf /usr/local/.ghcup/
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/local/lib/node_modules
        df -h
        sudo -E apt-get -qq update
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp \
          nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-ply \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig \
          texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 克隆源代码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 启用编译缓存
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: 'immortalwrt21-cortexa7-vfpv4'
        prefix: ${{ github.workspace }}/openwrt

    - name: 加载自定义 feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
   
    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 修复 golang 版本
      run: |
        cd openwrt
        rm -rf feeds/packages/lang/golang
        git clone https://github.com/kenzok8/golang -b 1.25 feeds/packages/lang/golang

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 升级部分网络软件包版本
      run: |
        cd openwrt

        rm -rf feeds/packages/net/natmap
        wget -r --no-parent https://cdn.jsdelivr.net/gh/immortalwrt/packages@master/net/natmap/
        cp -rf cdn.jsdelivr.net/gh/immortalwrt/packages@master/net/natmap feeds/packages/net/natmap/
        rm -rf cdn.jsdelivr.net
        find feeds/packages/net/natmap -name index.html -exec rm {} \;

        rm -rf feeds/packages/net/ddns-go
        wget -r --no-parent https://cdn.jsdelivr.net/gh/immortalwrt/packages@master/net/ddns-go/
        cp -rf cdn.jsdelivr.net/gh/immortalwrt/packages@master/net/ddns-go feeds/packages/net/ddns-go/
        rm -rf cdn.jsdelivr.net
        find feeds/packages/net/ddns-go -name index.html -exec rm {} \;    

        rm -rf feeds/packages/net/frp
        wget -r --no-parent https://cdn.jsdelivr.net/gh/immortalwrt/packages@master/net/frp/
        cp -rf cdn.jsdelivr.net/gh/immortalwrt/packages@master/net/frp feeds/packages/net/frp/
        rm -rf cdn.jsdelivr.net
        find feeds/packages/net/frp -name index.html -exec rm {} \;

    - name: 升级 turboacc 版本
      run: |
        cd openwrt
        # 升级 turboacc 到最新版本
        rm -rf feeds/luci/applications/luci-app-turboacc
        wget "https://www.dropbox.com/scl/fi/uccikbibj772c4sekzbk7/luci-app-turboacc.zip?rlkey=yzhkk0lfzhrthn8hbl1qt8k5j&st=31820445&dl=1" -O luci-app-turboacc.zip
        unzip luci-app-turboacc.zip -d feeds/luci/applications/
        rm -rf luci-app-turboacc.zip
        echo "✓ 已升级 turboacc 到最新版本"

    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 检查配置冲突（hostapd vs wpad）
      run: |
        cd openwrt
        echo "=========================================="
        echo "检查 hostapd 和 wpad 配置冲突..."
        echo "=========================================="
        
        # 检查 .config 文件中的冲突
        if grep -q "CONFIG_PACKAGE_hostapd" .config && grep -q "CONFIG_PACKAGE_wpad" .config; then
            echo "⚠ 警告：检测到 hostapd 和 wpad 可能同时启用"
            echo "hostapd 状态:"
            grep "CONFIG_PACKAGE_hostapd" .config || echo "  未找到"
            echo "wpad 状态:"
            grep "CONFIG_PACKAGE_wpad" .config || echo "  未找到"
            
            # 强制禁用 wpad
            echo "正在强制禁用 wpad..."
            sed -i 's/^CONFIG_PACKAGE_wpad.*/# CONFIG_PACKAGE_wpad is not set/g' .config
            sed -i 's/^CONFIG_PACKAGE_wpad-basic.*/# CONFIG_PACKAGE_wpad-basic is not set/g' .config
            sed -i 's/^CONFIG_PACKAGE_wpad-basic-wolfssl.*/# CONFIG_PACKAGE_wpad-basic-wolfssl is not set/g' .config
            echo "✅ 已强制禁用 wpad 相关包"
        else
            echo "✅ 未检测到明显冲突"
        fi
        
        # 验证最终状态
        echo ""
        echo "最终配置状态:"
        echo "hostapd:"
        grep "CONFIG_PACKAGE_hostapd" .config || echo "  未启用"
        echo "wpad:"
        grep "CONFIG_PACKAGE_wpad" .config || echo "  未启用"
        echo "=========================================="

    - name: 检查关键功能配置
      run: |
        cd openwrt
        echo "=========================================="
        echo "检查关键功能配置..."
        echo "=========================================="
        
        # 检查必需功能
        REQUIRED_FEATURES="CONFIG_DRIVER_11N_SUPPORT CONFIG_DRIVER_11AC_SUPPORT CONFIG_DRIVER_11AX_SUPPORT"
        MISSING=0
        
        for feature in $REQUIRED_FEATURES; do
            if grep -q "^${feature}=y" .config; then
                echo "✅ ${feature} 已启用"
            else
                echo "❌ ${feature} 未启用"
                MISSING=$((MISSING+1))
            fi
        done
        
        # 检查 WPA3 支持
        if grep -q "CONFIG_WPA_SAE_SUPPORT=y" .config; then
            echo "✅ WPA3 (SAE) 支持已启用"
        else
            echo "⚠ WPA3 (SAE) 支持未启用"
        fi
        
        if grep -q "CONFIG_WPA_MBO_SUPPORT=y" .config; then
            echo "✅ WPA MBO 支持已启用"
        else
            echo "⚠ WPA MBO 支持未启用"
        fi
        
        if [ $MISSING -gt 0 ]; then
            echo "⚠ 发现 $MISSING 个缺失的必需功能"
        else
            echo "✅ 所有必需功能已正确配置"
        fi
        echo "=========================================="

    - name: SSH 连接至 Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: 修复部分下载失败问题
      run: |
        cd openwrt
        mkdir -p dl
        wget "https://www.dropbox.com/scl/fi/9ts30p2csnlb9imaf8k68/backports-20210222-5.4-qsdk-11.5.0.5.tar.xz?rlkey=sntbyfjgg86gu2uoocgb9ggp1&st=7w81hl56&dl=1" -O dl/backports-20210222-5.4-qsdk-11.5.0.5.tar.xz
        wget "https://www.dropbox.com/scl/fi/gu7ge6jmefn72ttuop1zs/linux-5.4-qsdk-11.5.0.5.tar.xz?rlkey=tdpq0ye35x290frbh7i8uqrm8&st=jjvegqrr&dl=1" -O dl/linux-5.4-qsdk-11.5.0.5.tar.xz

    - name: 下载软件包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译前最终验证
      run: |
        cd openwrt
        echo "=========================================="
        echo "编译前最终验证..."
        echo "=========================================="
        
        # 验证 .config 文件
        if [ ! -f .config ]; then
            echo "❌ 错误：.config 文件不存在！"
            exit 1
        fi
        
        # 验证 hostapd 配置
        if grep -q "CONFIG_PACKAGE_hostapd-wolfssl=y" .config; then
            echo "✅ hostapd-wolfssl 已正确配置"
        else
            echo "⚠ 警告：hostapd-wolfssl 未启用"
        fi
        
        # 最终冲突检查
        if grep -q "^CONFIG_PACKAGE_wpad.*=y" .config; then
            echo "❌ 错误：仍然检测到启用的 wpad 包！"
            echo "启用的 wpad 包："
            grep "^CONFIG_PACKAGE_wpad.*=y" .config
            echo "尝试修复..."
            sed -i '/^CONFIG_PACKAGE_wpad.*=y/d' .config
            echo "✅ 已删除 wpad 配置"
        else
            echo "✅ 无 wpad 冲突"
        fi
        
        echo "=========================================="
        echo "准备开始编译..."
        echo "=========================================="

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) 线程编译"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        
    - name: 检查磁盘空间
      if: (!cancelled())
      run: df -hT

    - name: 上传 bin 目录
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 整理固件文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件目录
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 编译结果摘要
      if: always()
      run: |
        echo "=========================================="
        echo "编译结果摘要"
        echo "=========================================="
        echo "✅ 工作流执行完成"
        echo "📦 固件位置：openwrt/bin/targets/"
        if [ -f openwrt/.config ]; then
            echo "🔧 使用的配置：$(grep CONFIG_TARGET_BOARD openwrt/.config | head -1)"
        fi
        echo "=========================================="

    - name: 删除旧的工作流运行记录
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3

name: 构建 -多ssid加软件包精简

on:
  workflow_dispatch:
  schedule:
    - cron: 0 8 * * 2

env:
  REPO_URL: https://github.com/kkstone/immortalwrt-ipq50xx
  REPO_BRANCH: openwrt-21.02
  CONFIG_FILE: 精简版.config
  DIY_P1_SH: 多ssid.sh
  DIY_P2_SH: diy-part2.sh

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@main

    # ============================================
    # 1. 环境准备
    # ============================================
    - name: 安装编译依赖
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex gawk gcc-multilib g++-multilib \
          gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    # ============================================
    # 2. 克隆代码
    # ============================================
    - name: 克隆源代码
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    # ============================================
    # 3. 缓存（加速编译）
    # ============================================
    - name: 缓存下载
      uses: actions/cache@v3
      with:
        path: openwrt/dl
        key: dl-${{ hashFiles('openwrt/.config') }}
        restore-keys: dl-

    # ============================================
    # 4. 更新 feeds
    # ============================================
    - name: 更新 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # ============================================
    # 5. 应用配置
    # ============================================
    - name: 应用基础配置
      run: |
        cd openwrt
        cp $GITHUB_WORKSPACE/$CONFIG_FILE .config

    - name: 执行 diy-part1.sh
      run: |
        chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 执行 diy-part2.sh
      run: |
        chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    # ============================================
    # 6. 关键检查（编译前验证）
    # ============================================
    - name: 检查配置
      run: |
        cd openwrt
        
        echo "=========================================="
        echo "编译前配置检查"
        echo "=========================================="
        
        # 检查 wpad-wolfssl（必须）
        if grep -q "CONFIG_PACKAGE_wpad-wolfssl=y" .config; then
            echo "✅ wpad-wolfssl 已启用"
        else
            echo "❌ wpad-wolfssl 未启用，编译将失败"
            exit 1
        fi
        
        # 检查 frp（警告但不失败）
        if grep -q "CONFIG_PACKAGE_frp=y" .config; then
            echo "⚠️ 警告: frp 已启用，可能导致 quic-go 编译错误"
        else
            echo "✅ frp 已禁用"
        fi
        
        # 检查 CPU 调频（可选）
        if grep -q "CONFIG_PACKAGE_kmod-cpufreq-dt=y" .config; then
            echo "✅ CPU 频率调节已启用"
        fi
        
        # 检查配置文件完整性
        if [ -s .config ]; then
            echo "✅ .config 存在，$(wc -l < .config) 行"
        else
            echo "❌ .config 为空"
            exit 1
        fi
        
        echo "=========================================="

    - name: 生成最终配置
      run: |
        cd openwrt
        make defconfig
        
        # 验证 defconfig 没有破坏我们的设置
        if grep -q "CONFIG_PACKAGE_frp=y" .config; then
            echo "⚠️ 警告: defconfig 重新启用了 frp"
        fi

    # ============================================
    # 7. 下载源码
    # ============================================
    - name: 下载软件包
      run: |
        cd openwrt
        make download -j8
        
        # 检查下载完整性
        DL_COUNT=$(find dl -type f | wc -l)
        if [ $DL_COUNT -lt 5 ]; then
            echo "⚠️ 警告: 只下载了 $DL_COUNT 个文件，可能有问题"
        else
            echo "✅ 下载了 $DL_COUNT 个文件"
        fi

    # ============================================
    # 8. 编译
    # ============================================
    - name: 编译固件
      run: |
        cd openwrt
        echo "使用 $(nproc) 线程编译"
        make -j$(nproc) || {
          echo "并行编译失败，尝试单线程..."
          make -j1
        }

    # ============================================
    # 9. 上传
    # ============================================
    - name: 上传固件
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_$(date +%Y%m%d_%H%M)
        path: openwrt/bin/targets/*/*
